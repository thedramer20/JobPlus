  spring.application.name=jobplus
server.port=9090
spring.datasource.url=jdbc:h2:mem:jobplusdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.sql.init.mode=always
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.jobplus.entity

# ✅ HikariCP Configuration - Fix Thread Starvation
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20

app.jwt.secret=jobplus-jobplus-jobplus-jobplus-secret-key-2026
app.jwt.expiration-ms=86400000
app.frontend.base-url=http://localhost:5173


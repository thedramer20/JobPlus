# OAuth Configuration Template
# Add your OAuth credentials from Google and GitHub Developer Console

# Google OAuth Configuration
# Get credentials from: https://console.cloud.google.com/
oauth.google.client-id=YOUR_GOOGLE_CLIENT_ID
oauth.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
oauth.google.redirect-uri=http://localhost:3000/auth/callback

# GitHub OAuth Configuration  
# Get credentials from: https://github.com/settings/developers
oauth.github.client-id=YOUR_GITHUB_CLIENT_ID
oauth.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
oauth.github.redirect-uri=http://localhost:3000/auth/callback

# OAuth Callback URL
app.oauth.callback-url=http://localhost:3000/auth/callback
